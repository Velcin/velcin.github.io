[project]
site_name = "Cours LLM & Transformers"
site_author = "Julien Velcin"

# Les scripts externes pour afficher les équations LaTeX
extra_javascript = [
  "javascripts/mathjax.js",
  "https://polyfill.io/v3/polyfill.min.js?features=es6",
  "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
]

# ---------------------------------------------------
# Activation des extensions Markdown
# En TOML, on déclare chaque extension avec des crochets
# ---------------------------------------------------

# Coloration syntaxique du code
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

# Blocs de code avancés
[project.markdown_extensions.pymdownx.superfences]

# Support des mathématiques
[project.markdown_extensions.pymdownx.arithmatex]
generic = true

# Les fameux accordéons (sections rétractables)
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
